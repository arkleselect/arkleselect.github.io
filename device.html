<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device</title>
    <link rel="icon" href="/image/TopLogo.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .device-block {
            width: 220px;
            height: 150px;
            border-radius: 12px;
            background-color: #eceaea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #333;
            margin: 20px auto;
            transition: background-color 0.3s, border-color 0.3s;
            box-shadow: 0 5px 7px rgba(0, 0, 0, 0.2);
        }

        .device-block:hover {
            background-color: rgb(226, 223, 223);
            border-color: #eceaeb;
            /* box-shadow: 0 2px 3px rgba(0, 0, 0, 0.2); */
        }

        .device-block img {
            width: 55px;
            height: 60px;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="device-block">
        <img src="../../image/jianpan.svg">
    </div>

    <div class="device-block">
        <img src="../../image/shubiao.svg">
    </div>

    <div class="device-block">
        <img src="../../image/diannao.svg">
    </div>

    <div class="device-block">
        <img src="../../image/shoubing.svg">
    </div>
</body>

</html>
